name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short -coverprofile=coverage.out ./...

      - name: Coverage gate
        env:
          # Ratchet floor — must not drop below this. Raise it as coverage
          # improves; target is 60% (see CLAUDE.md). Current: ~46.9%.
          MIN_COVERAGE: '44'
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}% (floor: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit !(t+0 >= m+0) }' \
            || { echo "::error::coverage ${total}% is below floor ${MIN_COVERAGE}%"; exit 1; }

      - name: Vet
        run: go vet ./...

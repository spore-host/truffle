# GoReleaser configuration for spore-host/truffle
version: 2

builds:
  - id: truffle
    main: .
    binary: truffle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/spore-host/truffle/cmd.Version={{.Version}}
      - -X github.com/spore-host/truffle/cmd.GitCommit={{.Commit}}
      - -X github.com/spore-host/truffle/cmd.BuildDate={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: truffle-archive
    name_template: 'truffle_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - package_name: truffle
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/truffle/copyright
        type: doc
    rpm:
      summary: "Find and discover AWS EC2 instance types"

brews:
  - name: truffle
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/truffle
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0
    test: |
      system "#{bin}/truffle", "version"
    install: |
      bin.install "truffle"

scoops:
  - name: truffle
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/truffle
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0

release:
  github:
    owner: spore-host
    name: truffle
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{.Version}}"
